<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIT Notification Tracker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <div class="pulse"></div>
                <h1>BIT Tracker</h1>
            </div>
            <div class="status-panel">
                <div class="status-card">
                    <span class="label">Scraper Status</span>
                    <span class="value" id="scraper-status">Checking...</span>
                </div>
                <div class="status-card">
                    <span class="label">Active Subscribers</span>
                    <span class="value" id="sub-count">--</span>
                </div>
                <div class="status-card">
                    <span class="label">WhatsApp Channel</span>
                    <span class="value" id="whatsapp-status">Checking...</span>
                </div>
                <div class="status-card">
                    <span class="label">Broadcast Mode</span>
                    <span class="value" id="broadcast-status">Checking...</span>
                </div>
            </div>
        </header>

        <main>
            <section class="announcements-section">
                <div class="section-header">
                    <h2>Latest Announcements</h2>
                    <button id="refresh-btn" class="btn">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        Refresh
                    </button>
                </div>
                <div class="announcements-list" id="announcements-container">
                    <div class="loading">Loading announcements...</div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>BIT Announcement Tracker Bot System</p>
        </footer>
    </div>
    
    <template id="announcement-template">
        <div class="announcement-card">
            <div class="card-header">
                <div>
                    <span class="source-badge"></span>
                    <h3 class="title"></h3>
                </div>
                <span class="date"></span>
            </div>
            <div class="card-body">
                <a href="#" class="link-btn" target="_blank">View <span>→</span></a>
            </div>
        </div>
    </template>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
