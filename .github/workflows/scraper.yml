name: Periodic BIT Announcement Scraper

on:
  schedule:
    # Runs every 20 minutes
    - cron: '*/20 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cron scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WHATSAPP_ENABLED: ${{ secrets.WHATSAPP_ENABLED }}
          WHATSAPP_PROVIDER: ${{ secrets.WHATSAPP_PROVIDER }}
          WHATSAPP_API_URL: ${{ secrets.WHATSAPP_API_URL }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
          WHATSAPP_CHANNEL_ID: ${{ secrets.WHATSAPP_CHANNEL_ID }}
          PAUSE_NOTIFICATIONS: ${{ secrets.PAUSE_NOTIFICATIONS }}
        run: python cron_scraper.py
